<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HSC Trial Studio</title>
<style>
:root {
  --bg: #eef3fb;
  --card: #ffffff;
  --ink: #10203f;
  --muted: #5c6b8a;
  --line: #d7e1f2;
  --primary: #2f6fed;
  --primary-dark: #1c4fc0;
  --primary-light: #e7effe;
  --accent: #ff7e29;
  --accent-dark: #e35f0a;
  --green: #1fb673;
  --green-light: #e3f9ee;
  --coral: #ef4444;
  --coral-light: #fdecec;
  --purple: #7c5cff;
  --yellow: #ffc93c;
  --shadow: 0 10px 24px rgba(16, 32, 63, 0.08);
  --radius: 14px;
}
* { box-sizing: border-box; }
body { margin:0; font-family:"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.45; }
main { max-width:1100px; margin:0 auto; padding:20px 20px 60px; display:grid; gap:22px; }
h1,h2,h3 { margin:0; }
p { margin:0 0 10px; }
button { font:inherit; cursor:pointer; border:none; border-radius:8px; padding:10px 16px; background:var(--primary); color:#fff; font-weight:700; transition:transform .08s ease, background .15s ease; }
button:hover { background:var(--primary-dark); }
button:active { transform:scale(.97); }
button.secondary { background:var(--card); color:var(--primary-dark); border:2px solid var(--primary-light); }
button.secondary:hover { background:var(--primary-light); }
button.ghost { background:transparent; color:var(--muted); border:2px solid var(--line); }
article { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); }

.topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; background:linear-gradient(120deg,#0f1f42,#1c3d8f 60%,#2f6fed); color:#fff; padding:22px 24px; border-radius:0 0 20px 20px; flex-wrap:wrap; }
.topbar .eyebrow { color:#a9c2ff; }
.topbar h1 { font-size:1.8rem; }
.eyebrow { text-transform:uppercase; letter-spacing:1.2px; font-size:.72rem; font-weight:800; color:var(--primary-dark); margin:0 0 4px; }
.hero-stats { display:flex; gap:10px; flex-wrap:wrap; }
.stat-chip { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.35); border-radius:12px; padding:10px 16px; text-align:right; display:grid; gap:2px; }
.stat-chip span { font-size:.75rem; color:#cfe0ff; }
.stat-chip strong { font-size:1.05rem; color:var(--yellow); }

.overview-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
.subject-tile { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; display:grid; gap:6px; border-bottom:4px solid var(--primary); cursor:pointer; text-align:left; width:100%; color:var(--ink); }
.subject-tile:hover { border-color: var(--primary-dark); }
.subject-tile .tile-top { display:flex; justify-content:space-between; align-items:baseline; }
.subject-tile strong { font-size:1.05rem; }
.subject-tile .tile-count { font-size:1.4rem; font-weight:800; color:var(--primary-dark); }
.subject-tile .tile-bar { height:8px; border-radius:6px; background:var(--line); overflow:hidden; }
.subject-tile .tile-bar-fill { height:100%; background:var(--accent); }
.subject-tile span.tile-sub { font-size:.8rem; color:var(--muted); }

.tabs { display:flex; gap:8px; flex-wrap:wrap; }
.tab { background:var(--card); color:var(--muted); border:2px solid var(--line); border-radius:10px; font-weight:800; padding:10px 16px; font-size:.9rem; }
.tab:hover { background:var(--primary-light); color:var(--primary-dark); }
.tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }

.panel { display:none; }
.panel.active { display:grid; gap:18px; }

.section-head { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
.section-head h2 { font-size:1.3rem; }
.button-row { display:flex; gap:8px; flex-wrap:wrap; }

.real-papers { padding:18px 20px; }
.real-papers h3 { color:var(--primary-dark); margin-bottom:6px; font-size:1rem; }
.real-papers p.note { color:var(--muted); font-size:.85rem; margin-bottom:10px; }
.paper-links { display:flex; flex-wrap:wrap; gap:8px; }
.paper-links a { background:var(--primary-light); color:var(--primary-dark); border-radius:8px; padding:8px 12px; font-weight:700; font-size:.85rem; text-decoration:none; }
.paper-links a:hover { background:var(--primary); color:#fff; }

.test-head { padding:18px 20px; display:grid; gap:10px; }
.test-progress { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.test-progress .badge { background:var(--primary-light); color:var(--primary-dark); font-weight:800; border-radius:8px; padding:6px 12px; font-size:.85rem; }
.test-progress .badge.done { background:var(--green-light); color:#0f7a4c; }

.q-card { padding:16px 18px; display:grid; gap:10px; }
.q-card .q-topic { font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; color:var(--purple); font-weight:800; }
.q-card p.q-prompt { font-size:1rem; color:var(--ink); margin-bottom:0; }

.options { display:grid; gap:8px; }
.option-btn { text-align:left; background:#fff; border:2px solid var(--line); border-radius:8px; padding:10px 14px; color:var(--ink); font-weight:600; }
.option-btn:hover { border-color:var(--primary); }
.option-btn.selected { border-color:var(--primary); background:var(--primary-light); }
.option-btn.correct { border-color:var(--green); background:var(--green-light); color:#0f7a4c; }
.option-btn.incorrect { border-color:var(--coral); background:var(--coral-light); color:#b91c1c; }
.q-explain { font-size:.85rem; color:var(--muted); background:var(--bg); border-radius:8px; padding:10px 12px; display:none; }
.q-explain.show { display:block; }

.numeric-row { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
.numeric-row input { min-height:42px; border:1px solid var(--line); border-radius:6px; padding:0 12px; font-size:1rem; }
.q-feedback { font-size:.88rem; min-height:20px; color:var(--muted); }
.q-feedback.correct { color:var(--green); font-weight:700; }
.q-feedback.incorrect { color:var(--coral); font-weight:700; }
.q-help { font-size:.82rem; color:var(--muted); }

.essay-prompt { padding:18px 20px; display:grid; gap:10px; }
.essay-prompt .prompt-text { font-size:1.02rem; font-weight:600; color:var(--ink); }
.essay-prompt textarea { width:100%; min-height:140px; border:2px solid var(--line); border-radius:10px; padding:10px; font:inherit; resize:vertical; }
.checklist { display:grid; gap:6px; background:var(--bg); border-radius:10px; padding:12px 14px; }
.checklist label { display:flex; gap:8px; align-items:flex-start; font-size:.88rem; color:var(--ink); }
.band6 { font-size:.85rem; color:var(--muted); background:var(--primary-light); border-radius:8px; padding:10px 12px; }
.band6 strong { color:var(--primary-dark); }

.topic-legend { display:flex; gap:8px; flex-wrap:wrap; font-size:.78rem; color:var(--muted); }
.topic-legend span { background:var(--bg); border-radius:6px; padding:4px 10px; }

@media (max-width:920px) {
  .overview-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
}
@media (max-width:640px) {
  .overview-grid { grid-template-columns:1fr; }
  .numeric-row { grid-template-columns:1fr; }
  button { width:100%; }
  .button-row { display:grid; }
}
</style>
</head>
<body>
<header class="topbar">
  <div>
    <p class="eyebrow">HSC 2026 &middot; Self-study trial platform</p>
    <h1>HSC Trial Studio</h1>
  </div>
  <div class="hero-stats">
    <div class="stat-chip"><span>Exams start</span><strong id="countdownLabel">-</strong></div>
    <div class="stat-chip"><span>Study streak</span><strong id="streakLabel">0 days</strong></div>
  </div>
</header>

<main>
  <section aria-label="Overview">
    <div class="section-head">
      <div>
        <p class="eyebrow">All subjects</p>
        <h2>Your progress</h2>
      </div>
    </div>
    <div class="overview-grid" id="overviewGrid"></div>
  </section>

  <nav class="tabs" id="subjectTabs" aria-label="Subjects"></nav>

  <div id="subjectPanels"></div>
</main>

<script>
// ---------------- Helpers ----------------
function byId(id){ return document.getElementById(id); }
function randomInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function round(v,d){ const f=Math.pow(10,d); return Math.round(v*f)/f; }
function sinD(d){ return Math.sin(d*Math.PI/180); }
function cosD(d){ return Math.cos(d*Math.PI/180); }
function tanD(d){ return Math.tan(d*Math.PI/180); }
function dateKey(d){ const x=new Date(d); x.setHours(0,0,0,0); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; }
function shuffledCopy(arr){ const c=arr.slice(); for(let i=c.length-1;i>0;i--){ const j=randomInt(0,i); [c[i],c[j]]=[c[j],c[i]]; } return c; }

const STORAGE_KEY = "hscTrialStudioState";
function loadState(){ try{ const raw=localStorage.getItem(STORAGE_KEY); return raw?JSON.parse(raw):{}; }catch(e){ return {}; } }
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); }catch(e){} }
const saved = loadState();
saved.subjects = saved.subjects || {};
saved.studyDays = saved.studyDays || {};
const today = new Date();
const todayKey = dateKey(today);

function ensureSubjectState(id){
  if(!saved.subjects[id]) saved.subjects[id] = { testsCompleted: 0 };
  return saved.subjects[id];
}

function logStudyToday(){
  saved.studyDays[todayKey] = true;
  saveState();
  setHeaderStats();
}

function computeStreak(){
  let streak=0;
  const cursor=new Date(today); cursor.setHours(0,0,0,0);
  if(!saved.studyDays[dateKey(cursor)]) cursor.setDate(cursor.getDate()-1);
  while(saved.studyDays[dateKey(cursor)]){ streak++; cursor.setDate(cursor.getDate()-1); }
  return streak;
}

function setHeaderStats(){
  const examDate = new Date(2026,9,13); // 13 Oct 2026
  const diffDays = Math.max(0, Math.ceil((examDate - today)/86400000));
  byId("countdownLabel").textContent = `${diffDays} days`;
  const streak = computeStreak();
  byId("streakLabel").textContent = `${streak>0?"\ud83d\udd25 ":""}${streak} day${streak===1?"":"s"}`;
}

// ---------------- NESA real paper links ----------------
const NESA_BASE = "https://www.nsw.gov.au/education-and-training/nesa/curriculum/hsc-exam-papers";
const NESA_BROWSE = "https://www.nsw.gov.au/education-and-training/nesa/curriculum/hsc-exam-resources";
function realPapersHtml(subject){
  if(subject.nesaVerified){
    return `
      <p class="note">Free, official NESA past HSC papers and marking guidelines (current syllabus, 2020&ndash;2025). These are the real thing &mdash; use them for full 3-hour timed simulations.</p>
      <div class="paper-links">
        <a href="${NESA_BASE}/${subject.nesaSlug}" target="_blank" rel="noopener">All ${subject.name} past papers (NESA) \u2192</a>
      </div>`;
  }
  return `
    <p class="note">NESA's exact page for ${subject.name} moves around a bit &mdash; use this official browse page and filter/search for "${subject.name}" to get free past papers and marking guidelines (current syllabus, 2020&ndash;2025).</p>
    <div class="paper-links">
      <a href="${NESA_BROWSE}?category=${subject.nesaCategory}" target="_blank" rel="noopener">Browse ${subject.nesaCategoryLabel} past papers (NESA) \u2192</a>
    </div>`;
}

// ---------------- Subject content ----------------
const SUBJECTS = [];

// ---- Physics (MCQ bank) ----
SUBJECTS.push({
  id:"physics", name:"Physics", type:"mcq",
  nesaSlug:"physics", nesaVerified:true,
  topics:["Advanced Mechanics","Electromagnetism","Nature of Light","Universe to the Atom"],
  bank:[
    {topic:"Advanced Mechanics", q:"For a projectile launched at angle \u03b8 with speed u (no air resistance), which angle gives the maximum range?", options:["30\u00b0","45\u00b0","60\u00b0","90\u00b0"], correct:1, explain:"Range is maximised at 45\u00b0 since range \u221d sin(2\u03b8), which peaks when 2\u03b8 = 90\u00b0."},
    {topic:"Advanced Mechanics", q:"In uniform circular motion, the centripetal acceleration is directed:", options:["away from the centre","tangent to the path","toward the centre","in the direction of motion"], correct:2, explain:"Centripetal acceleration always points toward the centre of the circle."},
    {topic:"Advanced Mechanics", q:"Kepler's Third Law states the square of a planet's orbital period is proportional to:", options:["the planet's mass","the cube of the orbital radius","the square of the orbital radius","the planet's velocity"], correct:1, explain:"T\u00b2 \u221d r\u00b3 is Kepler's Third Law."},
    {topic:"Advanced Mechanics", q:"A satellite in geostationary orbit has a period equal to:", options:["1 hour","24 hours","27 days","365 days"], correct:1, explain:"Geostationary satellites orbit once every 24 hours, matching Earth's rotation."},
    {topic:"Advanced Mechanics", q:"Escape velocity from a planet depends on:", options:["the mass and radius of the planet only","the mass of the escaping object only","the planet's rotation speed","the object's colour"], correct:0, explain:"Escape velocity v = \u221a(2GM/r) depends only on the planet's mass and radius."},
    {topic:"Advanced Mechanics", q:"In projectile motion (ignoring air resistance), which velocity component stays constant?", options:["vertical","horizontal","both","neither"], correct:1, explain:"There is no horizontal force acting, so horizontal velocity is constant."},
    {topic:"Advanced Mechanics", q:"Centripetal force is:", options:["a new fundamental force","the net force causing circular motion","always friction","always gravity"], correct:1, explain:"Centripetal force is simply the label for whatever net force causes circular motion."},
    {topic:"Advanced Mechanics", q:"As a rocket burns fuel and loses mass during launch, for constant thrust its acceleration:", options:["decreases","stays the same","increases","becomes zero"], correct:2, explain:"a = F/m, so as mass m decreases with constant thrust F, acceleration increases."},
    {topic:"Electromagnetism", q:"A current-carrying wire in a magnetic field experiences a force given by:", options:["F = qE","F = BIL sin\u03b8","F = ma","F = mv\u00b2/r"], correct:1, explain:"The force on a current-carrying conductor is F = BIL sin\u03b8."},
    {topic:"Electromagnetism", q:"According to Lenz's Law, an induced current opposes:", options:["the resistance of the circuit","the change in magnetic flux that produced it","the applied EMF's direction","gravity"], correct:1, explain:"Lenz's Law: induced current opposes the change in flux that caused it."},
    {topic:"Electromagnetism", q:"An ideal transformer that increases voltage must:", options:["increase current proportionally","decrease current proportionally","keep current the same","have no effect on current"], correct:1, explain:"Power is conserved (Vp Ip = Vs Is), so if voltage increases, current decreases."},
    {topic:"Electromagnetism", q:"The right-hand rule is used to find the direction of:", options:["gravitational force","the magnetic field around a current-carrying wire","the electric field between capacitor plates","radioactive decay"], correct:1, explain:"The right-hand grip rule gives the magnetic field direction around a wire."},
    {topic:"Electromagnetism", q:"Eddy currents in a metal plate moving through a magnetic field cause:", options:["an increase in speed","a braking (opposing) force","no effect at all","only a temperature rise, no force"], correct:1, explain:"Eddy currents create a force opposing the motion, acting as an electromagnetic brake."},
    {topic:"Electromagnetism", q:"In an AC generator, EMF is maximum when the coil's plane is:", options:["parallel to the magnetic field lines","perpendicular to the field lines","stationary","irrelevant to orientation"], correct:0, explain:"EMF is maximal when the rate of change of flux is greatest, which occurs when the coil plane is parallel to B."},
    {topic:"Electromagnetism", q:"A split-ring commutator in a DC motor:", options:["increases the voltage","reverses current direction each half rotation to keep torque one-directional","acts as a fuse","stores charge"], correct:1, explain:"The commutator reverses current every half turn so the torque keeps rotating the coil the same way."},
    {topic:"Electromagnetism", q:"Magnetic flux through a loop depends on:", options:["only the magnetic field strength","field strength, loop area, and the angle between them","only the loop's resistance","only the current in the loop"], correct:1, explain:"\u03a6 = B\u00b7A\u00b7cos\u03b8, so flux depends on field strength, area, and angle."},
    {topic:"Nature of Light", q:"Which experiment provided strong evidence for the wave nature of light?", options:["Photoelectric effect","Young's double slit experiment","Rutherford scattering","Millikan oil drop"], correct:1, explain:"Young's double slit produced an interference pattern, a wave phenomenon."},
    {topic:"Nature of Light", q:"The photoelectric effect provided evidence that light:", options:["is purely a wave","can behave as discrete packets of energy (photons)","has no energy","travels slower in a vacuum"], correct:1, explain:"The photoelectric effect can only be explained if light delivers energy in discrete photon packets."},
    {topic:"Nature of Light", q:"Einstein's photoelectric equation is:", options:["E = mc\u00b2","E = hf = KEmax + W\u2080","F = ma","E = mgh"], correct:1, explain:"E = hf = KEmax + W\u2080 relates photon energy to kinetic energy and work function."},
    {topic:"Nature of Light", q:"As an object's speed approaches the speed of light, special relativity predicts its energy:", options:["decreases toward zero","approaches infinity","stays constant","becomes negative"], correct:1, explain:"Relativistic energy increases without bound as v approaches c."},
    {topic:"Nature of Light", q:"Time dilation predicts that a moving clock, observed from a stationary frame, runs:", options:["faster","slower","at the same rate","backwards"], correct:1, explain:"Moving clocks are observed to run slower relative to a stationary observer."},
    {topic:"Nature of Light", q:"The Michelson-Morley experiment failed to detect the:", options:["speed of light","luminiferous ether","electron","photon"], correct:1, explain:"It found no evidence of the ether, supporting the idea light needs no medium."},
    {topic:"Nature of Light", q:"Which is NOT a postulate of special relativity?", options:["laws of physics are the same in all inertial frames","the speed of light in a vacuum is constant for all observers","absolute time exists for all observers","simultaneity is relative"], correct:2, explain:"Special relativity rejects absolute time; time is relative to the observer's frame."},
    {topic:"Nature of Light", q:"Diffraction is most noticeable when aperture/obstacle size is:", options:["much larger than the wavelength","similar in size to the wavelength","irrelevant to wavelength","exactly zero"], correct:1, explain:"Diffraction effects are strongest when the obstacle is comparable in size to the wavelength."},
    {topic:"Universe to the Atom", q:"Rutherford's gold foil experiment led to the discovery of:", options:["the electron","a small, dense, positively charged nucleus","the neutron","quarks"], correct:1, explain:"Alpha particle deflections revealed a small, dense, positive nucleus."},
    {topic:"Universe to the Atom", q:"In the Bohr model, electrons can only occupy orbits with:", options:["any radius","quantised (discrete) energy levels","zero energy","continuous energy"], correct:1, explain:"Bohr proposed electrons occupy only certain discrete, quantised energy levels."},
    {topic:"Universe to the Atom", q:"Nuclear fusion, as occurs in the Sun, involves:", options:["splitting heavy nuclei","combining light nuclei into a heavier nucleus","releasing electrons only","absorbing photons only"], correct:1, explain:"Fusion combines light nuclei (e.g. hydrogen) into heavier nuclei, releasing energy."},
    {topic:"Universe to the Atom", q:"The strong nuclear force:", options:["acts over very large astronomical distances","acts over very short distances, holding the nucleus together","repels protons and neutrons","is weaker than gravity at all distances"], correct:1, explain:"The strong force operates over short (femtometre) ranges and binds the nucleus."},
    {topic:"Universe to the Atom", q:"Which particle is NOT considered fundamental in the Standard Model?", options:["quark","electron","proton","photon"], correct:2, explain:"A proton is made of quarks, so it is not fundamental."},
    {topic:"Universe to the Atom", q:"Hertzsprung-Russell diagrams plot a star's:", options:["mass vs radius","luminosity vs surface temperature","age vs colour only","distance vs brightness only"], correct:1, explain:"HR diagrams plot luminosity against surface temperature (or spectral class)."},
    {topic:"Universe to the Atom", q:"A main-sequence star like the Sun is primarily powered by:", options:["nuclear fission","hydrogen fusion into helium","chemical burning","gravitational contraction only"], correct:1, explain:"Main-sequence stars fuse hydrogen into helium in their cores."},
    {topic:"Universe to the Atom", q:"The half-life of a radioactive isotope is the time for:", options:["all of the sample to decay","half of the sample to decay","the sample to double","the sample to stop decaying"], correct:1, explain:"Half-life is defined as the time for half the radioactive nuclei to decay."}
  ],
  numeric:[
    {topic:"Advanced Mechanics", prompt:"A ball is thrown horizontally at 15 m/s from a 20 m high cliff. Using g = 10 m/s\u00b2, how long does it take to hit the ground (s)?", answer:2, help:"t = \u221a(2h/g) = \u221a(40/10)."},
    {topic:"Advanced Mechanics", prompt:"A car travels in a circle of radius 50 m at constant speed 20 m/s. Find the centripetal acceleration (m/s\u00b2).", answer:8, help:"a = v\u00b2/r = 400/50."},
    {topic:"Electromagnetism", prompt:"A 0.5 m wire carries 4 A in a 0.2 T field, perpendicular to the field. Find the force on the wire (N).", answer:0.4, help:"F = BIL = 0.2 \u00d7 4 \u00d7 0.5."},
    {topic:"Electromagnetism", prompt:"A transformer has 100 primary turns and 400 secondary turns. If Vp = 20 V, find Vs (V) for an ideal transformer.", answer:80, help:"Vs = Vp \u00d7 (Ns/Np) = 20 \u00d7 4."},
    {topic:"Nature of Light", prompt:"Find the energy (in eV, 2 d.p.) of a photon with frequency 5\u00d710\u00b9\u2074 Hz. Use h = 4.14\u00d710\u207b\u00b9\u2075 eV\u00b7s.", answer:2.07, help:"E = hf."},
    {topic:"Nature of Light", prompt:"Light has wavelength 600 nm. Using c = 3\u00d710\u2078 m/s, find the frequency in units of 10\u00b9\u2074 Hz (e.g. 5 means 5\u00d710\u00b9\u2074 Hz), 2 d.p.", answer:5, help:"f = c/\u03bb."},
    {topic:"Universe to the Atom", prompt:"A sample has a half-life of 8 days. Starting with 80 g, how many grams remain after 24 days?", answer:10, help:"24 days = 3 half-lives, so 80/2\u00b3."},
    {topic:"Universe to the Atom", prompt:"A fission reaction releases 200 MeV per event. How much energy (MeV) is released by 5 events?", answer:1000, help:"200 \u00d7 5."}
  ],
  extended:[
    {topic:"Advanced Mechanics", marks:6, prompt:"A car of mass 1200 kg travels around a banked curve of radius 80 m at constant speed with no reliance on friction. Derive an expression for the optimum speed and explain the role of the normal force and gravity in providing centripetal force.", keyPoints:["Resolves the normal force into vertical and horizontal components","Identifies the horizontal component of the normal force as the source of centripetal force","Derives v = \u221a(rg\u00b7tan\u03b8)","Explains why no friction is needed when this component exactly matches the required centripetal force"]},
    {topic:"Advanced Mechanics", marks:4, prompt:"Using Kepler's laws and Newton's law of gravitation, explain why a satellite closer to Earth requires a shorter orbital period.", keyPoints:["States T\u00b2 \u221d r\u00b3 (Kepler's Third Law)","Links a smaller orbital radius to a smaller period","Explains via gravitational force providing centripetal force"]},
    {topic:"Electromagnetism", marks:7, prompt:"Compare the energy transformations in an AC generator and an electric motor, and explain why back-EMF is significant in a motor's operation.", keyPoints:["Generator: kinetic \u2192 electrical via electromagnetic induction","Motor: electrical \u2192 kinetic via force on a current-carrying coil","Back-EMF opposes the supply voltage as the coil spins","Back-EMF limits current draw and protects the motor at running speed"]},
    {topic:"Electromagnetism", marks:5, prompt:"Explain two reasons why real transformers are not 100% efficient.", keyPoints:["Eddy currents causing heat loss in the core","Hysteresis losses in the magnetic material","Resistive (I\u00b2R) losses in the windings","Flux leakage / incomplete flux linkage between coils"]},

// ---------------- Queues for random, non-repeating draws ----------------
const queues = {}; // key: subjectId+':'+bankName -> shuffled array
function nextFromBank(subjectId, bankName, bank){
  const key = subjectId + ":" + bankName;
  if(!queues[key] || queues[key].length === 0){
    queues[key] = shuffledCopy(bank);
  }
  return queues[key].pop();
}

// ---------------- Rendering: overview ----------------
function renderOverview(){
  byId("overviewGrid").innerHTML = SUBJECTS.map(s => {
    const st = ensureSubjectState(s.id);
    const count = st.testsCompleted % 20;
    const pct = Math.round((count/20)*100);
    return `
      <button class="subject-tile" data-goto="${s.id}" type="button">
        <div class="tile-top"><strong>${s.name}</strong><span class="tile-count">${count}/20</span></div>
        <div class="tile-bar"><div class="tile-bar-fill" style="width:${pct}%"></div></div>
        <span class="tile-sub">${st.testsCompleted >= 20 ? "Full set complete \u2013 great work!" : "Practice tests completed"}</span>
      </button>`;
  }).join("");
  byId("overviewGrid").querySelectorAll(".subject-tile").forEach(btn => {
    btn.addEventListener("click", () => activateSubject(btn.dataset.goto));
  });
}

// ---------------- Rendering: tabs & panels ----------------
function renderTabsAndPanels(){
  byId("subjectTabs").innerHTML = SUBJECTS.map((s,i) => `<button class="tab${i===0?" active":""}" data-tab="${s.id}" type="button">${s.name}</button>`).join("");
  byId("subjectPanels").innerHTML = SUBJECTS.map((s,i) => `<section class="panel${i===0?" active":""}" id="panel-${s.id}"></section>`).join("");

  byId("subjectTabs").querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => activateSubject(tab.dataset.tab));
  });

  SUBJECTS.forEach(s => renderSubjectPanel(s));
}

function activateSubject(id){
  byId("subjectTabs").querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === id));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
  const target = document.getElementById("panel-" + id);
  if(target && typeof target.scrollIntoView === "function"){
    target.scrollIntoView({behavior:"smooth", block:"start"});
  }
}

function testBadgeHtml(subject){
  const st = ensureSubjectState(subject.id);
  const displayNum = (st.testsCompleted % 20) + 1;
  return `<span class="badge${st.testsCompleted>0 && st.testsCompleted%20===0 ? " done":""}">Practice Test ${Math.min(displayNum,20)} of 20</span>`;
}

function examBadgeHtml(subject){
  const st = ensureSubjectState(subject.id);
  const count = st.examsCompleted || 0;
  return `<span class="badge${count>0 ? " done":""}">Full simulations completed: ${count}</span>`;
}

function renderSubjectPanel(subject){
  const panel = byId("panel-" + subject.id);

      <div class="section-head">

    </article>

          <h2>Full exam simulation</h2>
        </div>
        <div class="button-row">
          <button id="startExam-${subject.id}">Start full exam simulation</button>
          <button class="secondary" id="finishExam-${subject.id}">Finish simulation</button>
        </div>
      </div>

    </article>
    <div id="exam-${subject.id}"></div>
    ` : ""}
  `;

  byId("newTest-" + subject.id).addEventListener("click", () => renderTest(subject));
  byId("completeTest-" + subject.id).addEventListener("click", () => {
    const st = ensureSubjectState(subject.id);
    st.testsCompleted += 1;
    saveState();
    logStudyToday();
    byId("progress-" + subject.id).innerHTML = testBadgeHtml(subject);
    renderOverview();
  });

  if(exam){
    byId("startExam-" + subject.id).addEventListener("click", () => renderExamSimulation(subject));
    byId("finishExam-" + subject.id).addEventListener("click", () => {
      const st = ensureSubjectState(subject.id);
      st.examsCompleted = (st.examsCompleted || 0) + 1;

function renderTest(subject){
  const container = byId("questions-" + subject.id);
  if(subject.type === "mcq"){
    renderMcqTest(subject, container);
  } else if(subject.type === "numeric"){
    renderNumericTest(subject, container);
  } else if(subject.type === "essay"){
    renderEssayTest(subject, container);
  }
}

// ---------------- Full exam simulation renderer ----------------
function renderExamSimulation(subject){
  const container = byId("exam-" + subject.id);
  const exam = subject.exam;
  const allItems = []; // flat list of {section, item, idPrefix} for listener wiring after render

  let html = "";
  exam.sections.forEach((section, sIndex) => {
    const marksLabel = section.marks ? `${section.marks} marks` : "marks vary";
    html += `
      <article class="test-head">
        <div class="section-head">
          <div>
            <p class="eyebrow">${marksLabel} &middot; about ${section.minutes} minutes</p>
            <h2>${section.name}</h2>
          </div>
        </div>
        ${section.note ? `<p class="q-help">${section.note}</p>` : ""}
      </article>
    `;

    let items;
    if(section.type === "mcq" || section.type === "numeric"){
      items = shuffledCopy(subject.bank).slice(0, section.count);
    } else if(section.type === "extended"){
      items = shuffledCopy(subject.extended).slice(0, section.count);
    } else if(section.type === "essay"){
      const pool = subject.bank.filter(p => p.topic === section.tagFilter);
      items = shuffledCopy(pool).slice(0, section.count);
    }

    items.forEach((item, iIndex) => {
      const idPrefix = `exam-${subject.id}-${sIndex}-${iIndex}`;
      allItems.push({ type: section.type, item, idPrefix });

      if(section.type === "mcq"){
        html += `
          <article class="q-card">
            <span class="q-topic">${item.topic}</span>
            <p class="q-prompt"><strong>${iIndex+1}.</strong> ${item.q}</p>
            <div class="options" id="opts-${idPrefix}">
              ${item.options.map((opt,oi) => `<button class="option-btn" data-oi="${oi}" type="button">${opt}</button>`).join("")}
            </div>
            <div class="q-explain" id="explain-${idPrefix}">${item.explain}</div>
          </article>`;
      } else if(section.type === "numeric"){
        html += `
          <article class="q-card">
            <span class="q-topic">${item.topic}</span>
            <p class="q-prompt"><strong>${iIndex+1}.</strong> ${item.prompt}</p>
            <p class="q-help">${item.help}</p>
            <div class="numeric-row">
              <input type="number" step="0.01" id="input-${idPrefix}" aria-label="Answer">
              <button data-check="${idPrefix}">Check</button>
            </div>
            <span class="q-feedback" id="feedback-${idPrefix}"></span>
          </article>`;
      } else if(section.type === "extended"){
        html += `
          <article class="q-card">
            <span class="q-topic">${item.topic} &middot; ${item.marks} marks</span>
            <p class="q-prompt"><strong>${iIndex+1}.</strong> ${item.prompt}</p>
            <textarea placeholder="Draft your response here (optional, not saved)..." id="draft-${idPrefix}"></textarea>
            <button class="secondary" data-reveal="${idPrefix}" type="button">Reveal key points to self-mark</button>
            <div class="q-explain" id="reveal-${idPrefix}">
              <ul>${item.keyPoints.map(k => `<li>${k}</li>`).join("")}</ul>
            </div>
          </article>`;
      } else if(section.type === "essay"){
        html += `
          <article class="essay-prompt">
            <span class="q-topic">${item.topic}</span>
            <p class="prompt-text"><strong>${iIndex+1}.</strong> ${item.prompt}</p>
            <textarea placeholder="Plan or draft your response here (optional, not saved)..." id="draft-${idPrefix}"></textarea>
            <div class="checklist">
              ${subject.checklist.map((c,ci) => `<label><input type="checkbox" id="chk-${idPrefix}-${ci}"> ${c}</label>`).join("")}
            </div>
            <div class="band6"><strong>What Band 6 looks like:</strong> ${subject.band6}</div>
          </article>`;
      }
    });
  });

  container.innerHTML = html;

  allItems.forEach(({ type, item, idPrefix }) => {
    if(type === "mcq"){
      const wrap = byId("opts-" + idPrefix);
      wrap.querySelectorAll(".option-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const oi = Number(btn.dataset.oi);
          wrap.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected","correct","incorrect"));
          if(oi === item.correct){
            btn.classList.add("correct");
          } else {
            btn.classList.add("incorrect");
            wrap.children[item.correct].classList.add("correct");
          }
          byId("explain-" + idPrefix).classList.add("show");
        });
      });
    } else if(type === "numeric"){
      const checkBtn = container.querySelector(`button[data-check="${idPrefix}"]`);
      checkBtn.addEventListener("click", () => {
        const input = byId("input-" + idPrefix);
        const feedback = byId("feedback-" + idPrefix);
        if(input.value.trim() === ""){ feedback.textContent = "Try an answer first."; feedback.className="q-feedback"; return; }
        const value = Number(input.value);
        const tolerance = Number.isInteger(item.answer) ? 0.01 : 0.06;
        if(Math.abs(value - item.answer) <= tolerance){
          feedback.textContent = `Correct! ${item.answer}`;
          feedback.className = "q-feedback correct";
        } else {
          feedback.textContent = `Review it. Answer: ${item.answer}`;
          feedback.className = "q-feedback incorrect";
        }
      });
    } else if(type === "extended"){
      const revealBtn = container.querySelector(`button[data-reveal="${idPrefix}"]`);
      revealBtn.addEventListener("click", () => {
        byId("reveal-" + idPrefix).classList.toggle("show");
      });
    }
    // essay type needs no extra JS wiring beyond native checkbox/textarea behaviour
  });

  if(typeof container.scrollIntoView === "function"){
    container.scrollIntoView({behavior:"smooth", block:"start"});
  }
}


// ---------------- MCQ test renderer ----------------
function renderMcqTest(subject, container){
  const items = subject.numeric && subject.numeric.length ? [] : [];
  const mcqCount = 6;
  const numericCount = subject.numeric && subject.numeric.length ? 2 : 0;
  const questions = [];
  for(let i=0;i<mcqCount;i++) questions.push({ kind:"mcq", data: nextFromBank(subject.id, "mcq", subject.bank) });
  for(let i=0;i<numericCount;i++) questions.push({ kind:"numeric", data: nextFromBank(subject.id, "numeric", subject.numeric) });

  container.innerHTML = questions.map((item, index) => {
    if(item.kind === "mcq"){
      const q = item.data;
      return `
        <article class="q-card">
          <span class="q-topic">${q.topic}</span>
          <p class="q-prompt"><strong>${index+1}.</strong> ${q.q}</p>
          <div class="options" id="opts-${subject.id}-${index}">
            ${q.options.map((opt,oi) => `<button class="option-btn" data-oi="${oi}" type="button">${opt}</button>`).join("")}
          </div>
          <div class="q-explain" id="explain-${subject.id}-${index}">${q.explain}</div>
        </article>`;
    }
    const q = item.data;
    return `
      <article class="q-card">
        <span class="q-topic">${q.topic}</span>
        <p class="q-prompt"><strong>${index+1}.</strong> ${q.prompt}</p>
        <p class="q-help">${q.help}</p>
        <div class="numeric-row">
          <input type="number" step="0.01" id="input-${subject.id}-${index}" aria-label="Answer for question ${index+1}">
          <button data-check="${index}">Check</button>
        </div>
        <span class="q-feedback" id="feedback-${subject.id}-${index}"></span>
      </article>`;
  }).join("");

  questions.forEach((item, index) => {
    if(item.kind === "mcq"){
      const q = item.data;
      const wrap = byId(`opts-${subject.id}-${index}`);
      wrap.querySelectorAll(".option-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const oi = Number(btn.dataset.oi);
          wrap.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected","correct","incorrect"));
          if(oi === q.correct){
            btn.classList.add("correct");
          } else {
            btn.classList.add("incorrect");
            wrap.children[q.correct].classList.add("correct");
          }
          byId(`explain-${subject.id}-${index}`).classList.add("show");
        });
      });
    } else {
      const q = item.data;
      const checkBtn = container.querySelector(`button[data-check="${index}"]`);
      checkBtn.addEventListener("click", () => {
        const input = byId(`input-${subject.id}-${index}`);
        const feedback = byId(`feedback-${subject.id}-${index}`);
        if(input.value.trim() === ""){ feedback.textContent = "Try an answer first."; feedback.className="q-feedback"; return; }
        const value = Number(input.value);
        const tolerance = Number.isInteger(q.answer) ? 0.01 : 0.06;
        if(Math.abs(value - q.answer) <= tolerance){
          feedback.textContent = `Correct! ${q.answer}`;
          feedback.className = "q-feedback correct";
        } else {
          feedback.textContent = `Review it. Answer: ${q.answer}`;
          feedback.className = "q-feedback incorrect";
        }
      });
    }
  });
}

      <span class="q-topic">${q.topic}</span>

      <div class="numeric-row">

    checkBtn.addEventListener("click", () => {
      const input = byId(`input-${subject.id}-${index}`);
      const feedback = byId(`feedback-${subject.id}-${index}`);
      if(input.value.trim() === ""){ feedback.textContent = "Try an answer first."; feedback.className="q-feedback"; return; }
